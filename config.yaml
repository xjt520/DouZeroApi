# DouZero API 配置文件

# 模型配置
model:
  # 模型类型: ADP 或 WP
  type: ADP
  
  # 模型基础路径
  base_path: baselines
  
  # 各位置模型路径（可选，不填则使用默认路径）
  # 格式: {base_path}/douzero_{type}/{position}.ckpt
  paths:
    landlord: ""
    landlord_up: ""
    landlord_down: ""

# 服务配置
server:
  host: "0.0.0.0"
  port: 8000
  log_level: "info"
